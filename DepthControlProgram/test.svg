<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" width="100%" height="100%">
  <defs>
    <!-- 箭头定义 -->
    <marker id="arrow-end" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="black" />
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#fafafa" />

  <!-- 标题与公式 -->
  <text x="325" y="30" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">深松机耕深几何模型示意图</text>
  <text x="325" y="60" font-size="14" text-anchor="middle" fill="blue" font-family="sans-serif">D = (L1 + Lt) sin(α - β) - Ht cos(α - β)</text>
  <text x="325" y="80" font-size="12" text-anchor="middle" fill="gray" font-family="sans-serif">注：D 为铲尖相对于下拉杆前铰点的垂直位移（α - β 为负时 D 为正）</text>

  <!-- 地面线 -->
  <line x1="50" y1="120" x2="600" y2="120" stroke="saddlebrown" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="560" y="115" fill="saddlebrown" font-size="12" font-family="sans-serif">地面线</text>

  <!-- 拖拉机车身 -->
  <line x1="80" y1="200" x2="250" y2="200" stroke="green" stroke-width="4"/>
  <text x="165" y="190" fill="green" font-size="12" text-anchor="middle" font-family="sans-serif">拖拉机车身</text>
  <line x1="80" y1="215" x2="250" y2="215" stroke="green" stroke-width="1.5" marker-end="url(#arrow-end)"/>
  <text x="165" y="230" fill="green" font-size="12" text-anchor="middle" font-family="sans-serif">β = 0° (水平)</text>

  <!-- 下拉杆 L1 -->
  <line x1="150" y1="200" x2="385" y2="75" stroke="blue" stroke-width="3"/>
  <circle cx="150" cy="200" r="5" fill="black" stroke="black"/>
  <circle cx="385" cy="75" r="5" fill="black" stroke="black"/>
  <text x="260" y="130" fill="blue" font-size="14" font-family="sans-serif">L1 (下拉杆)</text>

  <!-- 机具主梁与铲尖 -->
  <line x1="385" y1="75" x2="588" y2="27" stroke="red" stroke-width="3"/>
  <circle cx="588" cy="27" r="5" fill="red" stroke="black"/>
  <text x="588" y="15" fill="red" font-size="14" font-family="sans-serif">铲尖</text>

  <!-- 耕深 D -->
  <line x1="600" y1="27" x2="600" y2="115" stroke="black" stroke-width="1.5" marker-end="url(#arrow-end)"/>
  <text x="610" y="75" fill="black" font-size="14" font-family="sans-serif">耕深 D</text>

  <!-- 几何分解：Lt 与 Ht 的局部坐标 -->
  <line x1="385" y1="75" x2="558" y2="-25" stroke="gray" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="385" y1="75" x2="415" y2="127" stroke="gray" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="415" y1="127" x2="588" y2="27" stroke="gray" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="558" y1="-25" x2="588" y2="27" stroke="gray" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- 局部坐标垂直标识 -->
  <path d="M 395 75 L 395 85 L 385 85" fill="none" stroke="gray" stroke-width="1"/>
  
  <text x="460" y="20" fill="gray" font-size="12" font-family="sans-serif">Lt (水平)</text>
  <text x="400" y="115" fill="gray" font-size="12" font-family="sans-serif">Ht (垂直)</text>

  <!-- 相对倾角 θ = α - β -->
  <path d="M 425 75 A 40 40 0 0 0 419.6 55" fill="none" stroke="purple" stroke-width="2" marker-end="url(#arrow-end)"/>
  <text x="430" y="65" fill="purple" font-size="12" font-family="sans-serif">θ = α-β (负)</text>

  <!-- 传感器安装位置 -->
  <!-- 车身倾角传感器 β -->
  <rect x="150" y="170" width="20" height="15" fill="#ffeb3b" stroke="green" stroke-width="1"/>
  <text x="160" y="181" font-size="10" text-anchor="middle" font-family="sans-serif">β</text>

  <!-- 机具倾角传感器 α -->
  <rect x="320" y="155" width="20" height="15" fill="#ffeb3b" stroke="red" stroke-width="1" transform="rotate(-30, 330, 162)"/>
  <text x="330" y="163" font-size="10" text-anchor="middle" font-family="sans-serif" transform="rotate(-30, 330, 162)">α</text>

  <!-- 图示说明 -->
  <text x="450" y="160" font-size="12" fill="gray" font-family="sans-serif">注：Lt 和 Ht 为机具局部坐标，</text>
  <text x="450" y="175" font-size="12" fill="gray" font-family="sans-serif">随主梁一起旋转角度 θ。</text>
  <text x="450" y="190" font-size="12" fill="gray" font-family="sans-serif">当 θ = α-β 为负时，机具前俯。</text>
</svg>